{% extends "core/base.html" %}
{% block content %}

<h1 class="mb-4">View Quest: {{ item.title }}</h1>

<div class="row">
    <div class="col-md-8">
        <form method="post" action="/quest-applications/">
            <!-- Title -->
            <div class="mb-3">
                <label class="form-label">{{ item.title }}</label>                
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label">{{ item.description }}</label>                
            </div>

            <input type="hidden" name="quest_id" id="quest_id" value="{{ item.id }}">
            <button type="submit" class="btn btn-primary">Apply</button>            
        </form>
    </div>

    <!-- Колонка для картинки -->
    <div class="col-md-4">
        <label class="form-label">Quest Image</label>
        <img id="preview" src="{{ item.image_url or '/static/images/placeholder.png' }}" class="img-fluid mb-2" style="max-height: 300px; object-fit: cover; border: 1px solid #ccc; border-radius: 5px;">
    </div>
</div>



{% endblock %}
