{% extends "core/base.html" %}
{% block title %}{{ item.title }}{% endblock %}

{% block content %}


<div class="card-soft quest-header mb-4 p-4 d-flex">
    <img id="preview" src="{{ item.image_url or '/static/images/placeholder.png' }}" class="img-fluid mb-2" style="max-height: 300px; object-fit: cover; border: 1px solid #ccc; border-radius: 5px;">

    <div class="ms-4 flex-grow-1">
        <form method="post" action="/quest-applications/">
            <h2>{{ item.title }}</h2>
            <p class="text-muted">{{ item.description }}</p>

            {% set quest = item %}
            {% include "quests/_apply.html" %}
        </form>
    </div>

    <div>
        <span class="badge bg-warning text-dark">Draft</span>
    </div>
</div>


{% endblock %}
