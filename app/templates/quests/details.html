{% extends "base.html" %}
{% block content %}

<h1>{{ item.title }}</h1>

<form method="post" action="/quests/{{ item.id }}">
<div class="mb-3">
<label class="form-label">Name</label>

<input
    type="text"
    class="form-control"
    name="title"
    value="{{ item.title }}"
>

</div>

<button type="submit" class="btn btn-primary">Save</button>
<a
    href="/quests/"
    class="btn btn-secondary"
>
Cancel
</a>


</form>

{% endblock %}
