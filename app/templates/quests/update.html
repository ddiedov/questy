{% extends "core/base.html" %}
{% block content %}

<form method="post" action="/quests/{{ item.id }}" id="quest-form">

  <!-- HEADER -->
  <div class="qe-header">
    <img
      src="{{ item.image_url or '/static/images/placeholder.png' }}"
      class="qe-cover"
      id="preview"
    >

    <div class="qe-meta">
      <input name="title" class="qe-title" value="{{ item.title }}">
      <textarea name="description" class="qe-desc">{{ item.description }}</textarea>

      <div class="qe-actions">
        <button type="submit" class="btn btn-success btn-sm">Save</button>
        <a href="/quests" class="btn btn-outline-secondary btn-sm">Cancel</a>
      </div>
    </div>

    <div class="qe-status">Draft</div>
  </div>

  <input type="hidden" name="image_url" id="image-hidden" value="{{ item.image_url }}">

</form>


<!-- SCENARIO -->
<div class="qe-scenario">

  <div class="qe-scenario-head">
    <h5>Scenario</h5>
    {% include "quests/_add_task_actions.html" %}
  </div>

  <div class="qe-timeline">

    <!-- START -->
    <div class="qe-row">
      <div class="qe-col">
        <div class="qe-dot start">
          <i class="bi bi-play-fill"></i>
        </div>
      </div>
      <div></div>
    </div>

    {% for task in item.tasks %}
    <div class="qe-row">

      <div class="qe-col">
        <div class="qe-dot discover">
          <i class="bi bi-search"></i>
        </div>
      </div>

      <div class="qe-card">

        <img
          src="{{ task.task.image_url or '/static/images/placeholder.png' }}"
          class="qe-img"
        >

        <div class="qe-content">
          <div class="qe-title-sm">{{ task.task.title }}</div>
          <div class="qe-desc-sm">{{ task.task.description }}</div>
        </div>

        <div class="qe-menu">
          <i class="bi bi-three-dots"></i>
        </div>

      </div>

    </div>
    {% endfor %}

    <!-- FINISH -->
    <div class="qe-row">
      <div class="qe-col">
        <div class="qe-dot finish">
          <i class="bi bi-flag"></i>
        </div>
      </div>
      <div class="qe-card">
        {% include "quests/_add_task_actions.html" %}
      </div>
    </div>

  </div>

</div>


{% endblock %}
