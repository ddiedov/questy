<input type="hidden" name="quest_id" id="quest_id" value="{{ quest.id }}">
<input type="hidden" name="participant_id" id="participant_id" value="{{ request.state.user.id }}">
<input type="hidden" name="participant_type" id="participant_type" value="individual">
<input type="hidden" name="next" value="/quests/{{ quest.id }}">
<div class="d-flex gap-2">
    <button class="btn btn-outline-secondary">Preview Quest</button>
    <button type="submit" class="btn btn-success">Apply</button>
</div>
