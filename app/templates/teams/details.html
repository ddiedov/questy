{% extends "core/base.html" %}
{% block content %}

<h1>{{ item.name }}</h1>

<form method="post">
<div class="mb-3">
<label class="form-label">Name</label>

<input
    type="text"
    class="form-control"
    name="name"
    value="{{ item.name }}"
>

</div>

<button type="submit" class="btn btn-primary">Save</button>
<a
    href="/teams/"
    class="btn btn-secondary"
>
Cancel
</a>


</form>

{% endblock %}
