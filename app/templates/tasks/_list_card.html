  <div class="card mb-3 add-task-card">
    <div class="card-body d-flex align-items-center">

      <!-- IMAGE -->
      <img 
        src="{{ task.image_url or '/static/images/placeholder.png' }}" 
        class="rounded me-3"
        style="width: 80px; height: 80px; object-fit: cover;"
      >

      <!-- CONTENT -->
      <div class="flex-grow-1">
        <h5 class="mb-1">{{ task.title }}</h5>
        <p class="text-muted mb-0">
          {{ task.description }}
        </p>
      </div>

      <!-- ACTIONS -->
      <div class="ms-3 d-flex flex-column align-items-center">

        <!-- Add to quest -->
        <form method="post" action="/quest-structure/">
          <input type="hidden" name="quest_id" value="{{ quest_id }}">
          <input type="hidden" name="task_id" value="{{ task.id }}">
          <button class="btn btn-sm btn-light mb-1" title="Add to Quest">
            +
          </button>
        </form>

        
      </div>

    </div>
  </div>
