  <div class="card mb-3 add-task-card">
    <div class="card-body d-flex align-items-center">

      <!-- IMAGE -->
      <img 
        src="{{ task.image_url or '/static/images/placeholder.png' }}" 
        class="rounded me-3"
        style="width: 80px; height: 80px; object-fit: cover;"
      >

      <!-- CONTENT -->
      <div class="flex-grow-1">
        <h5 class="mb-1">{{ task.title }}</h5>
        <p class="text-muted mb-0">
          {{ task.description }}
        </p>
      </div>

      <!-- ACTIONS -->
      <div class="ms-3 d-flex flex-column align-items-center">

        <!-- UP -->
        <form method="post" action="/tasks/{{ task.id }}/move-up">
          <button class="btn btn-sm btn-light mb-1" title="Move up">
            ↑
          </button>
        </form>

        <!-- DOWN -->
        <form method="post" action="/tasks/{{ task.id }}/move-down">
          <button class="btn btn-sm btn-light mb-1" title="Move down">
            ↓
          </button>
        </form>

        <!-- EDIT -->
        <a href="/tasks/{{ task.id }}/edit" class="btn btn-sm btn-light mb-1" title="Edit">
          ✏️
        </a>

        <!-- DELETE -->
        <form method="post" action="/tasks/{{ task.id }}/delete">
          <button class="btn btn-sm btn-danger" title="Delete">
            🗑
          </button>
        </form>

      </div>

    </div>
  </div>
