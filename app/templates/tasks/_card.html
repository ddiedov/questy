<div class="timeline-step">

    <div class="timeline-icon bg-success">
        <i class="bi bi-search"></i>
    </div>

    <div class="step-card p-3 d-flex align-items-start">

        <!-- IMAGE -->
        <img 
          src="{{ task.task.image_url or '/static/images/placeholder.png' }}" 
          class="me-3 rounded"
          style="width: 80px; height: 80px; object-fit: cover;"
        >

        <!-- CONTENT -->
        <div class="flex-grow-1">

            <span class="badge bg-light text-muted text-uppercase">
                discover
            </span>

            <div class="fw-semibold mt-1">
                {{ task.task.title }}
            </div>

            <div class="text-muted small">
                {{ task.task.description }}
            </div>

            <div class="text-muted small mt-1">
                <i class="bi bi-clock"></i> 10 min
            </div>

        </div>

        <!-- ACTIONS (минимализм!) -->
        <div class="ms-2 dropdown">
            <button class="btn btn-sm btn-light" data-bs-toggle="dropdown">
                <i class="bi bi-three-dots"></i>
            </button>

            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#">Edit</a></li>
                <li><a class="dropdown-item" href="#">Move up</a></li>
                <li><a class="dropdown-item" href="#">Move down</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="#">Delete</a></li>
            </ul>
        </div>

    </div>
</div>
