{% extends "core/base.html" %}
{% block content %}
<h2>Tasks</h2>
<div class="container">
    <div class="row">

        {% for task in items %}
        <div class="col-12 col-sm-6 col-md-4 mb-4">
            {% include "tasks/_list_card.html" %}
        </div>
        {% endfor %}
        <div class="col-12 col-sm-6 col-md-4 mb-4">
            <div class="card">
                <div class="card-body text-center">
                    <h3>+</h3>
                    <p class="text-muted">
                        Create new task
                    </p>
                    <a href="/tasks/add" class="btn btn-primary">
                        Add task
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
