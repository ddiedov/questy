<aside class="navbar navbar-horizontal navbar-expand-lg">
  <div class="container-fluid">

    <h1 class="navbar-brand">
      Questy
    </h1>

    <ul class="navbar-nav">

      <li class="nav-item">
        <a class="nav-link" href="/dashboard">
          Dashboard
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="/teams">
          Teams
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="/quests">
          Quests
        </a>
      </li>

      {% set current_user = request.state.user %}

      {% if current_user %}
        <ul class="navbar-nav">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown">
              
              <!-- Аватар -->
              <img src="https://www.gravatar.com/avatar/{{ current_user.email | gravatar }}?d=identicon"
                   class="rounded-circle"
                   width="30" height="30">

              <span class="ms-2">{{ current_user.email }}</span>
            </a>

            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/profile">Profile</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="/logout">Logout</a></li>
            </ul>
          </li>
        </ul>
      {% else %}
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="/login">Login</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-primary ms-2" href="/signup">Sign Up</a>
          </li>
        </ul>
      {% endif %}

      
    </ul>

  </div>
</aside>
