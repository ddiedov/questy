<nav class="navbar navbar-expand-lg navbar-light custom-navbar">
  <div class="container-fluid">

    <!-- LEFT: Brand + Section -->
    <div class="d-flex align-items-center gap-4">

      <!-- BRAND -->
      <a class="navbar-brand fw-bold" href="/dashboard">
        <i class="bi bi-compass"></i> Questy
      </a>

      <!-- CURRENT SECTION -->
      <span class="text-muted d-flex align-items-center gap-1">
        <i class="bi bi-map"></i>
        <span class="fw-semibold">QUESTS</span>
      </span>

    </div>

    <!-- RIGHT -->
    <div class="d-flex align-items-center gap-3 ms-auto">

      <!-- Optional action -->
      <a href="#" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-eye"></i> Preview
      </a>

      {% set current_user = request.state.user %}

      {% if current_user %}
        <!-- USER -->
        <div class="dropdown">

          <a class="d-flex align-items-center text-decoration-none dropdown-toggle"
             href="#"
             data-bs-toggle="dropdown">

            <img src="https://www.gravatar.com/avatar/{{ current_user.email | gravatar }}?d=identicon"
                 class="avatar">

            <span class="ms-2 small">{{ current_user.email }}</span>
          </a>

          <ul class="dropdown-menu dropdown-menu-end">

            <li>
              <a class="dropdown-item" href="/profile">
                <i class="bi bi-person"></i> Profile
              </a>
            </li>

            <li><hr class="dropdown-divider"></li>

            <li>
              <a class="dropdown-item" href="/logout">
                <i class="bi bi-box-arrow-right"></i> Logout
              </a>
            </li>

          </ul>
        </div>

      {% else %}

        <a href="/login" class="nav-link">Login</a>
        <a href="/signup" class="btn btn-primary btn-sm">Sign Up</a>

      {% endif %}

    </div>
