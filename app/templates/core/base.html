
<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}Questy{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/css/tabler.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/components/navbar.css">
  <link rel="stylesheet" href="/static/css/pages/quests.css">
  <link rel="stylesheet" href="/static/css/pages/quest-editor.css">
  <link rel="stylesheet" href="/static/css/overrides.css">
</head>

<!--<body data-theme="dark">-->
<body>
{% include "core/_navbar.html" %}

{% if request.session.get("flash") %}
<div class="alert alert-success alert-dismissible fade show" role="alert">
    {{ request.session.get("flash") }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

{% set _ = request.session.pop("flash") %}
{% endif %}

<div class="page">
  <div class="page-wrapper">
    <div class="page-body">
      <div class="container-xl app-container">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/js/tabler.min.js"></script>
<script src="/static/js/image-upload.js"></script>
<script src="/static/js/setTimeout.js"></script>

</body>
</html>
